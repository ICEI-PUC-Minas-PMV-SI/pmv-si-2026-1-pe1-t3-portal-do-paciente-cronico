<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Paciente Crônico - Cadastro</title>
    <link rel="stylesheet" href="./css/variables.css?v=20260518a">
    <link rel="stylesheet" href="./css/global.css?v=20260518a">
    <link rel="stylesheet" href="./css/components.css?v=20260518a">
    <link rel="stylesheet" href="./css/dev-switcher.css?v=20260518a">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: var(--sp-6);
            background: var(--bg-color);
            color: var(--text-main);
        }
        .auth-card {
            width: 100%;
            max-width: 520px;
            animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .auth-title {
            font-size: 1.5rem;
            font-weight: var(--fw-bold);
            text-align: center;
            margin-bottom: var(--sp-1);
        }
        .auth-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: var(--sp-6);
        }
        .register-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: var(--sp-6);
            box-shadow: var(--shadow-md);
        }

        /* Profile Selector */
        .profile-selector {
            display: flex;
            gap: 8px;
            margin-bottom: var(--sp-5);
        }
        .profile-option {
            flex: 1;
            text-align: center;
            padding: 10px var(--sp-2);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: var(--transition-fast);
            font-size: 0.8125rem;
            font-weight: var(--fw-medium);
            color: var(--text-muted);
        }
        .profile-option:hover {
            border-color: var(--text-subtle);
        }
        .profile-option.selected {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary-dark);
            font-weight: var(--fw-semibold);
        }
        .profile-option i {
            display: block;
            margin: 0 auto 4px;
            width: 22px;
            height: 22px;
        }
        .profile-option input { display: none; }

        .condition-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .condition-label input[type="checkbox"] {
            accent-color: var(--primary);
        }

        .lgpd-label {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-weight: normal;
            font-size: 0.8125rem;
            color: var(--text-muted);
            cursor: pointer;
            line-height: 1.5;
        }
        .lgpd-label input {
            margin-top: 3px;
            accent-color: var(--primary);
        }

        .login-link {
            display: block;
            text-align: center;
            margin-top: var(--sp-4);
            font-size: 0.875rem;
            font-weight: var(--fw-medium);
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <h1 class="auth-title">Criar Conta</h1>
        <p class="auth-subtitle">Junte-se à plataforma de cuidado.</p>

        <div class="register-card">
            <label style="font-weight: var(--fw-semibold); font-size: 0.8125rem; display:block; margin-bottom: 8px; color: var(--text-secondary);">Eu sou um:</label>
            <div class="profile-selector" id="reg-profile-selector">
                <label class="profile-option selected">
                    <input type="radio" name="reg-profile" value="paciente" checked>
                    <i data-lucide="user"></i>
                    Paciente
                </label>
                <label class="profile-option">
                    <input type="radio" name="reg-profile" value="cuidador">
                    <i data-lucide="users"></i>
                    Cuidador
                </label>
                <label class="profile-option">
                    <input type="radio" name="reg-profile" value="medico">
                    <i data-lucide="stethoscope"></i>
                    Médico
                </label>
            </div>

            <div id="group-all-fields">
                <div class="form-group" id="group-name">
                    <label for="reg-name">Nome Completo</label>
                    <input type="text" id="reg-name" class="form-control" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label for="reg-cpf">CPF</label>
                    <input type="text" id="reg-cpf" class="form-control" placeholder="000.000.000-00" required>
                </div>

                <div class="form-group" id="group-crm" style="display: none;">
                    <label for="reg-crm">CRM</label>
                    <input type="text" id="reg-crm" class="form-control" placeholder="Apenas números">
                </div>

                <div class="form-group">
                    <label for="reg-password">Senha</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="Crie uma senha" required>
                </div>

                <div id="group-medico-hidden">
                    <div style="display:flex; gap:12px;">
                        <div class="form-group" style="flex:1;">
                            <label for="reg-birth">Nascimento</label>
                            <input type="date" id="reg-birth" class="form-control" required>
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label for="reg-sex">Sexo</label>
                            <select id="reg-sex" class="form-control">
                                <option value="M">Masculino</option>
                                <option value="F">Feminino</option>
                                <option value="O">Outro</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group" id="group-conditions">
                        <label>Qual sua Doença Crônica? (Opcional)</label>
                        <div style="display:flex; flex-wrap:wrap; gap:12px; margin-top:8px;">
                            <label class="condition-label"><input type="checkbox" class="cond-check" value="Diabetes"> Diabetes</label>
                            <label class="condition-label"><input type="checkbox" class="cond-check" value="Hipertensão"> Hipertensão</label>
                            <label class="condition-label"><input type="checkbox" class="cond-check" value="Asma"> Asma</label>
                        </div>
                    </div>

                    <div style="display:flex; gap:12px;">
                        <div class="form-group" style="flex:1;">
                            <label for="reg-blood">Sangue</label>
                            <select id="reg-blood" class="form-control">
                                <option value="">N/D</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex:2;">
                            <label for="reg-allergies">Alergias</label>
                            <input type="text" id="reg-allergies" class="form-control" placeholder="Ex: Pólen, Dipirona">
                        </div>
                    </div>
                </div>

                <div class="form-group mt-2" id="group-lgpd">
                    <label class="lgpd-label">
                        <input type="checkbox" id="reg-lgpd">
                        <span>Li e aceito os <a href="#" style="color:var(--primary);">Termos de Uso</a> e autorizo o processamento dos meus dados (<strong>LGPD</strong>).</span>
                    </label>
                </div>

                <button class="btn btn-primary mt-4" id="btn-register">
                    <span id="btn-register-text">Cadastrar</span>
                    <i data-lucide="check" id="btn-register-icon" style="width:18px; height:18px;"></i>
                </button>
            </div>
        </div>

        <a href="index.html" class="login-link">Já possui conta? Faça Login</a>
    </div>
</div>

<script src="./js/store.js?v=20260518a"></script>
<script src="./js/main.js?v=20260518a"></script>
<script src="./js/toast.js?v=20260518a"></script>
<script src="./js/auth.js?v=20260518a"></script>
<script src="./js/dev-switcher.js?v=20260518a"></script>
<script>
    lucide.createIcons();

    // Lógica Dinâmica de Formulário
    const radios = document.querySelectorAll('input[name="reg-profile"]');
    const groupMedicoHidden = document.getElementById('group-medico-hidden');
    const groupCrm = document.getElementById('group-crm');
    const groupName = document.getElementById('group-name');
    const groupLgpd = document.getElementById('group-lgpd');
    const btnText = document.getElementById('btn-register-text');
    const btnIcon = document.getElementById('btn-register-icon');

    function applyFormLogic() {
        const val = document.querySelector('input[name="reg-profile"]:checked').value;
        if (val === 'medico') {
            groupMedicoHidden.style.display = 'none';
            groupCrm.style.display = 'block';
            groupName.style.display = 'block';
            groupLgpd.style.display = 'block';
            btnText.innerText = 'Cadastrar';
            btnIcon.setAttribute('data-lucide', 'check');
        } else if (val === 'cuidador') {
            groupMedicoHidden.style.display = 'none';
            groupCrm.style.display = 'none';
            groupName.style.display = 'none';
            groupLgpd.style.display = 'none';
            btnText.innerText = 'Entrar Alternativo';
            btnIcon.setAttribute('data-lucide', 'arrow-right');
        } else {
            groupMedicoHidden.style.display = 'block';
            groupCrm.style.display = 'none';
            groupName.style.display = 'block';
            groupLgpd.style.display = 'block';
            btnText.innerText = 'Cadastrar';
            btnIcon.setAttribute('data-lucide', 'check');
        }
        lucide.createIcons();
    }

    radios.forEach(r => {
        r.addEventListener('change', (e) => {
            document.querySelectorAll('.profile-option').forEach(el => el.classList.remove('selected'));
            e.target.closest('.profile-option').classList.add('selected');
            applyFormLogic();
        });
    });

    applyFormLogic();

    // Máscara de CPF
    const cpfInput = document.getElementById('reg-cpf');
    if (cpfInput) {
        cpfInput.addEventListener('input', function(e) {
            let val = e.target.value.replace(/\D/g, '').slice(0, 11);
            let formatted = val;
            if (val.length > 9) {
                formatted = val.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, "$1.$2.$3-$4");
            } else if (val.length > 6) {
                formatted = val.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3");
            } else if (val.length > 3) {
                formatted = val.replace(/(\d{3})(\d{1,3})/, "$1.$2");
            }
            e.target.value = formatted;
        });
        cpfInput.setAttribute('inputmode', 'numeric');
        cpfInput.setAttribute('maxlength', '14');
    }
</script>
</body>
</html>
