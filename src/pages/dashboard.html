<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Portal do Paciente</title>
    <link rel="stylesheet" href="../css/variables.css?v=1778181033">
    <link rel="stylesheet" href="../css/global.css?v=1778181033">
    <link rel="stylesheet" href="../css/components.css?v=1778181033">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js?v=1778181033"></script>
    <style>
        .header-dash {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--sp-6);
        }
        .greeting-text {
            font-size: 1.5rem;
            font-weight: var(--fw-bold);
            letter-spacing: var(--ls-tight);
        }
        .greeting-date {
            font-size: 0.8125rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: var(--primary-light);
            border-radius: var(--radius-fab);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-weight: var(--fw-bold);
            font-size: 1.125rem;
            cursor: pointer;
            transition: var(--transition-fast);
            border: 2px solid transparent;
        }
        .user-avatar:hover {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* Status Card — Gradiente premium */
        .status-card {
            background: var(--primary-gradient);
            color: white;
            padding: var(--sp-5);
            border-radius: var(--radius-xl);
            margin-bottom: var(--sp-6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.2);
            position: relative;
            overflow: hidden;
        }
        .status-card::after {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }
        .status-card h2 {
            color: white;
            font-size: 1.125rem;
            font-weight: var(--fw-semibold);
        }
        .status-card p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.875rem;
        }
        .status-icon {
            background: rgba(255, 255, 255, 0.15);
            border-radius: var(--radius-fab);
            padding: 12px;
            backdrop-filter: blur(4px);
            position: relative;
            z-index: 1;
        }

        /* Medication List */
        .medication-list { margin-bottom: var(--sp-6); }
        .med-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--sp-3) var(--sp-4);
            border-bottom: 1px solid var(--border);
            transition: var(--transition-fast);
        }
        .med-card:last-child { border-bottom: none; }
        .med-card:hover { background: var(--surface-hover); }
        .med-card h4 {
            font-size: 0.9375rem;
            font-weight: var(--fw-semibold);
            margin: 0;
        }
        .med-card-info {
            color: var(--text-muted);
            font-size: 0.8125rem;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .med-card-time {
            color: var(--primary);
            font-weight: var(--fw-semibold);
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .med-check-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-hover);
            transition: var(--transition-fast);
        }
        .med-check-btn:hover { background: var(--primary-light); }

        /* Chart Section */
        .chart-section {
            margin-bottom: var(--sp-6);
        }
        .chart-section h3 {
            display: flex;
            align-items: center;
            gap: var(--sp-2);
            margin-bottom: var(--sp-3);
        }
        .chart-card {
            padding: var(--sp-4);
        }

        /* Grid responsivo para gráficos em desktop */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--sp-6);
        }
        @media (min-width: 768px) {
            .charts-grid { grid-template-columns: 1fr 1fr; }
        }

        /* Tabs */
        .tab-btn {
            flex: 1;
            padding: var(--sp-3);
            text-align: center;
            font-weight: var(--fw-semibold);
            font-size: 0.875rem;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .tab-btn:hover { color: var(--text-secondary); }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-content { display: none; padding-top: var(--sp-4); }
        .tab-content.active { display: block; }

        /* Chips */
        .chip {
            padding: 8px 16px;
            background: var(--surface-hover);
            border-radius: 999px;
            display: inline-block;
            margin: 4px;
            color: var(--text-secondary);
            font-size: 0.8125rem;
            font-weight: var(--fw-medium);
            border: 1.5px solid var(--border);
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .chip:hover { border-color: var(--text-subtle); }
        .chip.selected {
            background: var(--primary-light);
            color: var(--primary-dark);
            border-color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container animate-fade-in">
    <!-- Header -->
    <header class="header-dash mt-4">
        <div>
            <h1 class="greeting-text" id="user-greeting">Olá, Carregando...</h1>
            <p class="greeting-date" id="current-date">Hoje</p>
        </div>
        <div class="user-avatar" id="user-avatar-icon" onclick="window.location.href='profile.html'">-</div>
    </header>

    <div class="status-card" id="status-card">
        <div>
            <h2 id="status-title">Bem-vindo!</h2>
            <p id="status-msg">Carregando suas medições…</p>
        </div>
        <div class="status-icon">
            <i id="status-icon" data-lucide="award" style="color: white; width: 24px; height: 24px;"></i>
        </div>
    </div>

    <!-- Próximos Remédios -->
    <div class="chart-section">
        <h3>
            <i data-lucide="pill" style="width: 18px; height: 18px; color: var(--primary);"></i>
            Meus Remédios
        </h3>
        <div class="card medication-list" id="home-med-list" style="padding: 0; overflow: hidden;">
            <!-- Render via JS abaixo -->
        </div>
    </div>

    <!-- Gráficos: lado a lado em desktop -->
    <div class="charts-grid">
        <!-- Glicemia Chart -->
        <div class="chart-section">
            <h3>
                <i data-lucide="activity" style="width: 18px; height: 18px; color: var(--warning);"></i>
                Evolução Glicêmica
            </h3>
            <div class="card chart-card">
                <canvas id="glycemiaChart" height="200"></canvas>
            </div>
        </div>

        <!-- Pressão Chart -->
        <div class="chart-section">
            <h3>
                <i data-lucide="heart" style="width: 18px; height: 18px; color: var(--danger);"></i>
                Pressão Arterial
            </h3>
            <div class="card chart-card">
                <canvas id="pressureChart" height="200"></canvas>
            </div>
        </div>
    </div>
</div>

<button class="fab" id="fab-add"><i data-lucide="plus"></i></button>

<nav class="bottom-nav">
    <a href="dashboard.html" class="bottom-nav-item active"><i data-lucide="home"></i><span>Início</span></a>
    <a href="history.html" class="bottom-nav-item"><i data-lucide="clock"></i><span>Histórico</span></a>
    <a href="medications.html" class="bottom-nav-item"><i data-lucide="pill"></i><span>Remédios</span></a>
    <a href="profile.html" class="bottom-nav-item"><i data-lucide="user"></i><span>Perfil</span></a>
</nav>

<!-- Modal Overlay -->
<div class="modal-overlay" id="modal-overlay"></div>
<div class="bottom-sheet" id="quick-action-sheet">
    <div class="sheet-drag-handle"></div>
    <h3 class="mb-4 text-center">Novo Registro</h3>

    <div style="display: flex; border-bottom: 1px solid var(--border); margin-bottom: 16px;">
        <div class="tab-btn active" data-target="tab-pressao" id="t-pressao">Pressão</div>
        <div class="tab-btn" data-target="tab-glicemia" id="t-glicose">Glicose</div>
        <div class="tab-btn" data-target="tab-sintomas" id="t-sintomas">Sintomas</div>
    </div>

    <div id="tab-pressao" class="tab-content active" style="display: block;">
        <div class="form-group row" style="display: flex; gap: 16px;">
            <div style="flex: 1;">
                <label>Sistólica (Maior)</label>
                <input type="number" id="val-sys" class="form-control" placeholder="120" style="font-size: 1.25rem; text-align: center;">
            </div>
            <div style="flex: 1;">
                <label>Diastólica (Menor)</label>
                <input type="number" id="val-dia" class="form-control" placeholder="80" style="font-size: 1.25rem; text-align: center;">
            </div>
        </div>
    </div>

    <div id="tab-glicemia" class="tab-content">
        <div class="form-group">
            <label>Nível (mg/dL)</label>
            <input type="number" id="val-glicose" class="form-control" placeholder="95" style="font-size: 1.5rem; text-align: center; font-weight: 600; color: var(--primary);">
        </div>
    </div>

    <div id="tab-sintomas" class="tab-content">
        <p style="margin-bottom: 8px; font-size: 0.875rem; color: var(--text-muted);">Como você está se sentindo?</p>
        <div id="sintomas-chips">
            <div class="chip">Tontura</div><div class="chip">Dor de cabeça</div>
            <div class="chip">Cansaço</div><div class="chip">Falta de ar</div>
        </div>
        <div class="form-group mt-4">
            <label>Outro sintoma / Descrição detalhada</label>
            <textarea id="val-sintoma-desc" class="form-control" rows="2" placeholder="Ex: Tive bastante enjoô após o almoço..."></textarea>
        </div>
    </div>

    <div style="display: flex; gap: 12px; margin-top: 24px;">
        <button class="btn btn-outline" id="btn-cancel-action" style="flex: 1;">Cancelar</button>
        <button class="btn btn-primary" id="btn-save-record" style="flex: 1;">Salvar</button>
    </div>
</div>

<script src="../js/security.js?v=1778181033"></script>
<script src="../js/store.js?v=1778181033"></script>
<script src="../js/main.js?v=1778181033"></script>
<script src="../js/modal.js?v=1778181033"></script>
<script src="../js/toast.js?v=1778181033"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        lucide.createIcons();
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR', {weekday: 'long', day: 'numeric', month: 'short'});

        const currentUser = appStore.getCurrentUser();
        if (!currentUser) return; // security.js já redirecionou
        document.getElementById('user-greeting').innerText = `Olá, ${currentUser.name.split(' ')[0]}`;
        document.getElementById('user-avatar-icon').innerText = currentUser.name.charAt(0).toUpperCase();

        // Status card dinâmico baseado nos vitals mais recentes
        function updateStatusCard() {
            const vitals = appStore.getVitals();
            const lastG = (vitals.glycemia || []).slice(-1)[0];
            const lastP = (vitals.pressure || []).slice(-1)[0];

            const alerts = [];
            if (lastG && (lastG.value > 180 || lastG.value < 70)) {
                alerts.push(`Glicemia ${lastG.value} mg/dL`);
            }
            if (lastP && (lastP.sys >= 140 || lastP.dia >= 90)) {
                alerts.push(`Pressão ${lastP.sys}/${lastP.dia} mmHg`);
            }

            const title = document.getElementById('status-title');
            const msg   = document.getElementById('status-msg');
            const icon  = document.getElementById('status-icon');
            const card  = document.getElementById('status-card');
            if (!title || !msg || !icon || !card) return;

            if (alerts.length > 0) {
                title.textContent = 'Atenção!';
                msg.textContent = alerts.join(' · ') + ' fora do alvo';
                icon.setAttribute('data-lucide', 'alert-triangle');
                card.style.background = 'linear-gradient(135deg, #DC2626, #B91C1C)';
                card.style.boxShadow = '0 8px 24px rgba(220, 38, 38, 0.25)';
            } else if (!lastG && !lastP) {
                title.textContent = 'Comece agora';
                msg.textContent = 'Registre sua primeira medição.';
                icon.setAttribute('data-lucide', 'sparkles');
                card.style.background = '';
                card.style.boxShadow = '';
            } else {
                title.textContent = 'Muito bem!';
                msg.textContent = 'Medições em dia.';
                icon.setAttribute('data-lucide', 'award');
                card.style.background = '';
                card.style.boxShadow = '';
            }
            lucide.createIcons();
        }
        updateStatusCard();

        // Estado em memória dos checks de remédio (apenas durante a sessão diária)
        const todayKey = 'ppc_meds_taken_' + new Date().toISOString().slice(0, 10);
        const taken = new Set(JSON.parse(localStorage.getItem(todayKey) || '[]'));

        function persistTaken() {
            localStorage.setItem(todayKey, JSON.stringify(Array.from(taken)));
        }

        function renderHomeMeds() {
            const meds = appStore.getMedications();
            const medList = document.getElementById('home-med-list');
            if (meds.length > 0) {
                medList.innerHTML = meds.map(m => `
                    <div class="med-card">
                        <div>
                            <h4>${escapeHtml(m.name)}</h4>
                            <p class="med-card-info">
                                <span class="med-card-time">
                                    <i data-lucide="clock" style="width:13px;height:13px;"></i>
                                    ${escapeHtml(m.firstDose || 'Avisar')}
                                </span>
                                <span>•</span>
                                <span>${escapeHtml(m.dose || m.dosage || 'Dose padrão')}</span>
                            </p>
                        </div>
                        <button class="med-check-btn" data-med-id="${m.id}">
                            <i data-lucide="${taken.has(m.id) ? 'check-circle' : 'circle'}" ${taken.has(m.id) ? 'style="color:var(--success);"' : 'style="color:var(--text-subtle);"'}></i>
                        </button>
                    </div>
                `).join('');
                lucide.createIcons();
                medList.querySelectorAll('button[data-med-id]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = Number(btn.getAttribute('data-med-id'));
                        if (taken.has(id)) {
                            taken.delete(id);
                            btn.innerHTML = '<i data-lucide="circle" style="color:var(--text-subtle);"></i>';
                        } else {
                            taken.add(id);
                            btn.innerHTML = '<i data-lucide="check-circle" style="color:var(--success);"></i>';
                        }
                        persistTaken();
                        lucide.createIcons();
                    });
                });
            } else {
                medList.style.padding = 'var(--sp-4)';
                medList.innerHTML = `<p style="text-align:center; color:var(--text-muted); font-size:0.8125rem">Nenhum remédio cadastrado. Adicione em 'Remédios'.</p>`;
            }
        }
        renderHomeMeds();

        // Glycemia Chart
        const ctx = document.getElementById('glycemiaChart').getContext('2d');
        let glycemiaChartInstance;

        function renderGlycemiaChart() {
            const vitals = appStore.getVitals();
            if (glycemiaChartInstance) glycemiaChartInstance.destroy();
            if (!vitals.glycemia || vitals.glycemia.length === 0) return;

            glycemiaChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: vitals.glycemia.map(v => v.date),
                    datasets: [{
                        label: 'Glicemia (mg/dL)',
                        data: vitals.glycemia.map(v => v.value),
                        borderColor: '#2563EB',
                        backgroundColor: 'rgba(37, 99, 235, 0.06)',
                        borderWidth: 2.5,
                        pointBackgroundColor: '#2563EB',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: false, suggestedMin: 60, suggestedMax: 200, ticks: { font: { size: 11 }, color: '#94A3B8' }, grid: { color: '#F1F5F9' } },
                        x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#94A3B8' } }
                    }
                }
            });
        }
        renderGlycemiaChart();

        // Pressure Chart
        const ctxP = document.getElementById('pressureChart').getContext('2d');
        let pressureChartInstance;

        function renderPressureChart() {
            const vitals = appStore.getVitals();
            if (pressureChartInstance) pressureChartInstance.destroy();
            if (!vitals.pressure || vitals.pressure.length === 0) return;

            pressureChartInstance = new Chart(ctxP, {
                type: 'line',
                data: {
                    labels: vitals.pressure.map(v => v.date),
                    datasets: [
                        {
                            label: 'Sistólica',
                            data: vitals.pressure.map(v => v.sys),
                            borderColor: '#DC2626',
                            backgroundColor: 'rgba(220, 38, 38, 0.04)',
                            borderWidth: 2.5,
                            pointBackgroundColor: '#DC2626',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            fill: false,
                            tension: 0.3
                        },
                        {
                            label: 'Diastólica',
                            data: vitals.pressure.map(v => v.dia),
                            borderColor: '#0EA5E9',
                            backgroundColor: 'transparent',
                            borderWidth: 2.5,
                            pointBackgroundColor: '#0EA5E9',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                            fill: false,
                            tension: 0.3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, padding: 16, font: { size: 11, weight: '500' }, color: '#64748B' } } },
                    scales: {
                        y: { beginAtZero: false, suggestedMin: 60, suggestedMax: 180, ticks: { font: { size: 11 }, color: '#94A3B8' }, grid: { color: '#F1F5F9' } },
                        x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#94A3B8' } }
                    }
                }
            });
        }
        renderPressureChart();

        // Save Functionality from Modal
        const btnSave = document.getElementById('btn-save-record');
        let currentTab = 'tab-pressao';

        // Hook into modal tabs
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => { currentTab = e.target.getAttribute('data-target'); });
        });

        // Chips toggle
        document.querySelectorAll('.chip').forEach(c => {
            c.addEventListener('click', () => c.classList.toggle('selected'));
        });

        btnSave.addEventListener('click', () => {
            if (currentTab === 'tab-pressao') {
                const sys = document.getElementById('val-sys').value;
                const dia = document.getElementById('val-dia').value;
                if (!sys || !dia) {
                    showToast("Preencha sistólica e diastólica.", 'error');
                    return;
                }
                appStore.addPressure(sys, dia);
                renderPressureChart();
                updateStatusCard();
                document.getElementById('val-sys').value = '';
                document.getElementById('val-dia').value = '';
                showToast("Pressão salva com sucesso!", 'success');
            } else if (currentTab === 'tab-glicemia') {
                const val = document.getElementById('val-glicose').value;
                if (!val) {
                    showToast("Informe o valor da glicemia.", 'error');
                    return;
                }
                appStore.addGlycemia(val);
                renderGlycemiaChart();
                updateStatusCard();
                document.getElementById('val-glicose').value = '';
                showToast("Glicemia salva com sucesso!", 'success');
            } else {
                const chips = Array.from(document.querySelectorAll('#sintomas-chips .chip.selected')).map(c => c.innerText);
                const desc = document.getElementById('val-sintoma-desc').value;

                let finalDesc = [];
                if (chips.length > 0) finalDesc.push(chips.join(', '));
                if (desc) finalDesc.push(desc);

                if (finalDesc.length === 0) {
                    showToast("Selecione um sintoma ou descreva em texto livre.", 'error');
                    return;
                }
                appStore.addSymptom(finalDesc.join(' - '));
                document.getElementById('val-sintoma-desc').value = '';
                document.querySelectorAll('#sintomas-chips .chip.selected').forEach(c => c.classList.remove('selected'));
                showToast("Sintomas salvos com sucesso!", 'success');
            }

            // Fecha modal
            document.getElementById('modal-overlay').classList.remove('active');
            document.getElementById('quick-action-sheet').classList.remove('active');
            document.body.style.overflow = '';
        });
    });
</script>
</body>
</html>
