<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Paciente Crônico - Acesso</title>
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/components.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
            padding: var(--sp-6);
        }
        .brand-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--sp-6);
            color: white;
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>

<div class="container auth-container animate-fade-in text-center">
    
    <div class="brand-logo">
        <i data-lucide="heart-pulse" style="width: 40px; height: 40px;"></i>
    </div>
    
    <h1 class="mb-2">Bem-vindo(a)</h1>
    <p style="color: var(--text-muted);" class="mb-8">Selecione seu perfil e faça login.</p>

    <div class="card" style="text-align: left;">
        
        <div class="form-group">
            <label>Entrar como:</label>
            <select id="login-profile" class="form-control" style="font-weight: 600; color: var(--primary-dark);">
                <option value="paciente">Paciente</option>
                <option value="cuidador">Cuidador</option>
                <option value="medico">Profissional de Saúde</option>
            </select>
        </div>

        <div class="form-group">
            <label for="cpf">CPF ou E-mail</label>
            <input type="text" id="cpf" class="form-control" placeholder="Digite seu acesso..." value="000.000.000-00">
        </div>
        
        <div class="form-group">
            <label for="password">Senha</label>
            <div style="position: relative;">
                <input type="password" id="password" class="form-control" style="width: 100%;" placeholder="Sua senha" value="123456">
                <button type="button" style="position: absolute; right: 12px; top: 12px; color: var(--text-muted);" onclick="togglePassword()">
                    <i data-lucide="eye"></i>
                </button>
            </div>
        </div>

        <button class="btn btn-primary mt-4" id="btn-login">
            Entrar <i data-lucide="arrow-right"></i>
        </button>
        
        <div class="text-center mt-4">
            <a href="#" style="font-size: 0.875rem;" onclick="recoverPassword(event)">Esqueci minha senha</a>
        </div>
    </div>
    
    <button class="btn btn-outline mt-2" onclick="window.location.href='register.html'">
        Ainda não tem conta? Cadastre-se
    </button>
</div>

<script src="./js/store.js"></script>
<script src="./js/main.js"></script>
<script src="./js/auth.js"></script>
<script>
    lucide.createIcons();
    function togglePassword() {
        const input = document.getElementById('password');
        if (input.type === 'password') {
            input.type = 'text';
        } else {
            input.type = 'password';
        }
    }
</script>
</body>
</html>
