<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Paciente Crônico - Acesso</title>
    <link rel="stylesheet" href="./css/variables.css?v=1778181033">
    <link rel="stylesheet" href="./css/global.css?v=1778181033">
    <link rel="stylesheet" href="./css/components.css?v=1778181033">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: var(--sp-6);
            background: var(--bg-color);
            color: var(--text-main);
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .brand-logo {
            width: 72px;
            height: 72px;
            background: var(--primary-gradient);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--sp-5);
            color: white;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.25);
            animation: pulse-subtle 3s ease-in-out infinite;
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: var(--fw-bold);
            text-align: center;
            margin-bottom: var(--sp-1);
        }

        .auth-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-bottom: var(--sp-8);
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: var(--sp-6);
            box-shadow: var(--shadow-md);
        }

        .login-card .form-group:last-of-type {
            margin-bottom: var(--sp-2);
        }

        .password-wrapper {
            position: relative;
        }
        .password-wrapper .form-control {
            padding-right: 44px;
        }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-subtle);
            padding: 4px;
            display: flex;
        }
        .password-toggle:hover {
            color: var(--text-muted);
        }

        .forgot-link {
            display: block;
            text-align: center;
            font-size: 0.8125rem;
            color: var(--text-muted);
            margin-top: var(--sp-4);
        }
        .forgot-link:hover {
            color: var(--primary);
        }

        .register-link {
            margin-top: var(--sp-3);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="brand-logo">
            <i data-lucide="heart-pulse" style="width: 36px; height: 36px;"></i>
        </div>

        <h1 class="auth-title">Bem-vindo(a)</h1>
        <p class="auth-subtitle">Acesse seu portal de saúde</p>

        <div class="login-card">
            <div class="form-group">
                <label>Entrar como:</label>
                <select id="login-profile" class="form-control" style="font-weight: 500; color: var(--text-main);">
                    <option value="paciente">Paciente</option>
                    <option value="cuidador">Cuidador</option>
                    <option value="medico">Profissional de Saúde</option>
                </select>
            </div>

            <div class="form-group">
                <label for="cpf">CPF ou E-mail</label>
                <input type="text" id="cpf" class="form-control" placeholder="000.000.000-00 ou email@dominio.com" autocomplete="username" maxlength="60">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <div class="password-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="Sua senha" autocomplete="current-password">
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </div>

            <button class="btn btn-primary mt-4" id="btn-login">
                Entrar <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
            </button>

            <a href="#" class="forgot-link" onclick="recoverPassword(event)">Esqueci minha senha</a>
        </div>

        <button class="btn btn-outline register-link" onclick="window.location.href='register.html'">
            Ainda não tem conta? Cadastre-se
        </button>
    </div>
</div>

<script src="./js/store.js?v=1778181033"></script>
<script src="./js/main.js?v=1778181033"></script>
<script src="./js/toast.js?v=1778181033"></script>
<script src="./js/auth.js?v=1778181033"></script>
<script>
    lucide.createIcons();
    function togglePassword() {
        const input = document.getElementById('password');
        if (input.type === 'password') {
            input.type = 'text';
        } else {
            input.type = 'password';
        }
    }

    // Máscara inteligente: aplica formato de CPF se o usuário digita só números/pontuação;
    // se tiver "@" ou letras, deixa o valor intacto (é um e-mail).
    (function () {
        const cpfInput = document.getElementById('cpf');
        if (!cpfInput) return;
        cpfInput.addEventListener('input', function (e) {
            const raw = e.target.value;
            const looksLikeEmail = /[a-zA-Z@]/.test(raw);
            if (looksLikeEmail) return;
            let val = raw.replace(/\D/g, '').slice(0, 11);
            let formatted = val;
            if (val.length > 9) {
                formatted = val.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, "$1.$2.$3-$4");
            } else if (val.length > 6) {
                formatted = val.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3");
            } else if (val.length > 3) {
                formatted = val.replace(/(\d{3})(\d{1,3})/, "$1.$2");
            }
            e.target.value = formatted;
        });
    })();
</script>
</body>
</html>
